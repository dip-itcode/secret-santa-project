version: "3.9"

services:

  mongo:
    image: mongo:7.0
    container_name: secret_santa_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: secret_santa

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secret_santa_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/secret_santa
      FLASK_DEBUG: "false"
      PORT: "5000"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secret_santa_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

volumes:
  mongo_data:
